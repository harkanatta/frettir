<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amplified · News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,500;1,6..72,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0E0F13; --ink2: #13151b; --page: #F0EDE6; --sage: #7A9E87; --amber: #D4873A;
    --steel: #3A6B8A; --muted: #7a7870; --border: rgba(240,237,230,0.08); --radius: 6px;
  }
  body { background:var(--ink); color:var(--page); font-family:'IBM Plex Mono',monospace; font-size:14px; min-height:100vh; display:flex; flex-direction:column; }

  header { display:flex; align-items:center; justify-content:space-between; padding:16px 28px; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; background:rgba(14,15,19,.97); backdrop-filter:blur(8px); gap:14px; flex-wrap:wrap; }
  .logo { font-family:'Newsreader',serif; font-size:26px; font-weight:300; font-style:italic; color:var(--page); letter-spacing:-0.02em; flex-shrink:0; }
  .logo span { color:var(--amber); }
  .header-right { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .last-updated { font-size:10px; color:var(--muted); letter-spacing:.04em; }
  .btn { border:none; font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; cursor:pointer; padding:10px 20px; border-radius:var(--radius); transition:all .18s; }
  .btn-amber { background:var(--amber); color:var(--ink); }
  .btn-amber:hover { background:#e8983f; transform:translateY(-1px); box-shadow:0 4px 14px rgba(212,135,58,.35); }
  .btn-ghost { background:rgba(240,237,230,0.08); color:var(--page); border:1px solid rgba(240,237,230,.12); }
  .btn-ghost:hover { background:rgba(240,237,230,0.13); }
  .btn:disabled { opacity:.35; cursor:not-allowed; transform:none !important; box-shadow:none !important; }

  .app { display:flex; flex:1; min-height:0; }

  /* SIDEBAR */
  aside { width:290px; flex-shrink:0; background:#13151b; border-right:1px solid var(--border); overflow-y:auto; display:flex; flex-direction:column; }
  .sidebar-top { padding:14px 18px 10px; border-bottom:1px solid var(--border); display:flex; gap:8px; }
  .sel-btn { flex:1; padding:8px 0; font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; cursor:pointer; border-radius:var(--radius); border:1px solid rgba(240,237,230,.1); background:rgba(240,237,230,.05); color:var(--muted); transition:all .15s; }
  .sel-btn:hover { background:rgba(240,237,230,.1); color:var(--page); border-color:rgba(240,237,230,.2); }
  .sidebar-inner { flex:1; padding:8px 0 16px; }
  .sec-label { font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); padding:14px 18px 6px; }

  .src { display:flex; align-items:center; gap:10px; padding:10px 18px; cursor:default; border-left:3px solid transparent; transition:background .12s; }
  .src:hover { background:rgba(240,237,230,0.04); }
  .src.active { border-left-color:var(--amber); background:rgba(240,237,230,0.05); }
  .src.selected { border-left-color:var(--steel); background:rgba(58,107,138,.18); }

  .pulse { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .pulse.sporadic { background:var(--amber); animation:glow 3s ease-in-out infinite; }
  .pulse.weekly   { background:var(--sage); }
  .pulse.daily    { background:var(--steel); }
  .pulse.hourly   { background:#c05050; }
  @keyframes glow { 0%,100%{box-shadow:0 0 0 0 rgba(212,135,58,.5)} 50%{box-shadow:0 0 0 5px rgba(212,135,58,0)} }

  .src-info { flex:1; min-width:0; }
  .src-name { font-size:12px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--page); }
  .src-sub { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin-top:2px; }

  .toggle { width:36px; height:20px; border-radius:10px; border:none; cursor:pointer; position:relative; flex-shrink:0; background:rgba(240,237,230,.12); transition:background .2s; }
  .toggle.on { background:var(--sage); }
  .toggle::after { content:''; position:absolute; top:3px; left:3px; width:14px; height:14px; border-radius:50%; background:#fff; transition:transform .2s; box-shadow:0 1px 3px rgba(0,0,0,.3); }
  .toggle.on::after { transform:translateX(16px); }

  .sidebar-footer { padding:10px 16px; border-top:1px solid var(--border); }
  .add-btn { width:100%; background:transparent; border:1px dashed rgba(240,237,230,.15); color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.06em; text-transform:uppercase; padding:8px; cursor:pointer; transition:all .15s; }
  .add-btn:hover { border-color:var(--amber); color:var(--amber); }

  /* MAIN */
  main { flex:1; overflow-y:auto; padding:22px 24px; }
  .feed-header { display:flex; align-items:baseline; gap:10px; margin-bottom:16px; }
  .feed-title { font-family:'Newsreader',serif; font-size:26px; font-weight:300; font-style:italic; }
  .feed-count { font-size:11px; color:var(--muted); }

  .legend { display:flex; gap:14px; margin-bottom:20px; flex-wrap:wrap; }
  .leg { display:flex; align-items:center; gap:6px; font-size:10px; color:var(--muted); }
  .leg-dot { width:7px; height:7px; border-radius:50%; }

  .filter-bar { display:flex; gap:7px; margin-bottom:22px; flex-wrap:wrap; }
  .f-btn { padding:8px 16px; border:1px solid rgba(240,237,230,.1); background:rgba(240,237,230,.04); color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; letter-spacing:.05em; text-transform:uppercase; cursor:pointer; border-radius:20px; transition:all .15s; }
  .f-btn:hover { border-color:rgba(240,237,230,.25); color:var(--page); background:rgba(240,237,230,.08); }
  .f-btn.active { background:var(--amber); border-color:var(--amber); color:var(--ink); font-weight:600; }

  .rss-status { font-size:10px; padding:3px 9px; border-radius:2px; text-transform:uppercase; letter-spacing:.05em; }
  .rss-live { background:rgba(122,158,135,.2); color:var(--sage); }
  .rss-fallback { background:rgba(212,135,58,.15); color:var(--amber); }
  .rss-err { background:rgba(192,80,80,.15); color:#e88; }

  .src-group { margin-bottom:28px; }
  .grp-header { display:flex; align-items:center; gap:9px; margin-bottom:11px; padding-bottom:7px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
  .grp-name { font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; }
  .grp-badge { font-size:9px; padding:2px 7px; text-transform:uppercase; letter-spacing:.07em; }
  .b-sporadic { background:rgba(212,135,58,.2); color:var(--amber); }
  .b-weekly   { background:rgba(122,158,135,.2); color:var(--sage); }
  .b-daily    { background:rgba(58,107,138,.2);  color:#6aadd5; }
  .b-hourly   { background:rgba(192,80,80,.12);  color:#e88; }
  .grp-link { margin-left:auto; font-size:10px; color:var(--muted); text-decoration:none; }
  .grp-link:hover { color:var(--amber); }

  .news-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:10px; }
  .card { background:rgba(240,237,230,.04); border:1px solid rgba(240,237,230,.07); padding:18px 20px; text-decoration:none; display:block; border-radius:var(--radius); transition:all .18s; }
  .card:hover { border-color:rgba(240,237,230,.2); background:rgba(240,237,230,.08); transform:translateY(-1px); box-shadow:0 4px 16px rgba(0,0,0,.3); }
  .card.spot { border-color:rgba(212,135,58,.28); background:rgba(212,135,58,.04); }
  .card.spot:hover { border-color:rgba(212,135,58,.5); }
  .card-hed { font-family:'Newsreader',serif; font-size:17px; font-weight:300; line-height:1.45; color:var(--page); margin-bottom:9px; }
  .card-desc { font-size:12px; color:rgba(240,237,230,.5); line-height:1.55; margin-bottom:10px; }
  .card-meta { font-size:11px; color:var(--muted); }

  .empty { padding:60px 0; text-align:center; color:var(--muted); font-size:12px; line-height:2; }
  .spin { width:28px; height:28px; border:2px solid rgba(240,237,230,.1); border-top-color:var(--amber); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 14px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading { padding:70px 24px; text-align:center; color:var(--muted); }
  .loading-txt { font-size:12px; letter-spacing:.06em; text-transform:uppercase; margin-bottom:5px; }
  .loading-sub { font-size:10px; color:rgba(138,136,128,.55); }

  ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:rgba(240,237,230,.1); border-radius:2px; }

  @media(max-width:720px) {
    .app { flex-direction:column; }
    aside { width:100%; height:auto; max-height:260px; border-right:none; border-bottom:1px solid var(--border); }
    main { padding:16px 14px; }
    .news-grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">amplified<span>·</span></div>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated">not yet fetched</span>
    <button class="btn btn-amber" id="refreshBtn" onclick="fetchAll()">↻ Refresh</button>
  </div>
</header>

<div class="app">
  <aside>
    <div class="sidebar-top"><button class="sel-btn" onclick="selectAll()">All on</button><button class="sel-btn" onclick="selectNone()">All off</button></div>
    <div class="sidebar-inner" id="sidebarInner"></div>
  </aside>

  <main>
    <div class="feed-header">
      <div class="feed-title">Today's feed</div>
      <div class="feed-count" id="feedCount"></div>
    </div>
    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:var(--amber)"></div>sporadic · spotlight</div>
      <div class="leg"><div class="leg-dot" style="background:var(--sage)"></div>weekly</div>
      <div class="leg"><div class="leg-dot" style="background:#6aadd5"></div>daily</div>
      <div class="leg"><div class="leg-dot" style="background:#c88"></div>hourly · limited</div>
    </div>
    <div class="filter-bar">
      <button class="f-btn active" onclick="setFilter('all',this)">All</button>
      <button class="f-btn" onclick="setFilter('sporadic',this)">Sporadic</button>
      <button class="f-btn" onclick="setFilter('weekly',this)">Weekly</button>
      <button class="f-btn" onclick="setFilter('daily',this)">Daily</button>
      <button class="f-btn" onclick="setFilter('hourly',this)">Hourly</button>
      <button class="f-btn" onclick="setFilter('iceland',this)">🇮🇸 Iceland</button>
      <button class="f-btn" onclick="setFilter('international',this)">🌍 International</button>
    </div>
    <div id="feedContent">
      <div class="loading">
        <div style="font-family:'Newsreader',serif;font-size:24px;font-style:italic;color:rgba(240,237,230,.25);margin-bottom:10px">no news yet</div>
        <div class="loading-sub">Click ↻ Refresh to fetch from your sources</div>
      </div>
    </div>
  </main>
</div>

<script>
// ── RSS PROXY ──
// Server-side Netlify Function: fetches + parses the feed itself, so there's
// no third-party dependency and no CORS issue.
const RSS_PROXY = '/.netlify/functions/rss-proxy?url=';

// ── SOURCE REGISTRY ──
let SOURCES = [
  // ── ICELAND · ALTERNATIVE / INVESTIGATIVE ──
  { id:'ic1', name:'Heimildin', url:'https://heimildin.is', rss:'https://heimildin.is/feed/', freq:'weekly', region:'iceland', enabled:true },
  { id:'ic2', name:'Stundin (archive)', url:'https://stundin.is', rss:'https://stundin.is/rss/', freq:'weekly', region:'iceland', enabled:true },
  { id:'ic3', name:'Neistar', url:'https://neistar.is', rss:'https://neistar.is/feed/', freq:'sporadic', region:'iceland', enabled:true },
  { id:'ic13', name:'Þjóðólfur', url:'https://thjodolfur.is', rss:'https://thjodolfur.is/feed/', freq:'weekly', region:'iceland', enabled:true, maxItems:5 },

  // ── ICELAND · MAINSTREAM ──
  { id:'ic4', name:'RÚV', url:'https://www.ruv.is', rss:'https://www.ruv.is/rss/frettir', freq:'hourly', region:'iceland', enabled:true, maxItems:4 },
  { id:'ic5', name:'Vísir', url:'https://www.visir.is', rss:'https://www.visir.is/rss/allt', freq:'hourly', region:'iceland', enabled:true, maxItems:4 },
  { id:'ic6', name:'Morgunblaðið', url:'https://www.mbl.is', rss:'https://www.mbl.is/feeds/innlent/', freq:'daily', region:'iceland', enabled:true, maxItems:5 },
  { id:'ic7', name:'Fréttablaðið', url:'https://www.frettabladid.is', rss:'https://www.frettabladid.is/rss/', freq:'daily', region:'iceland', enabled:true, maxItems:4 },
  { id:'ic8', name:'DV', url:'https://www.dv.is', rss:'https://dv.is/feed/', freq:'daily', region:'iceland', enabled:true, maxItems:4 },
  { id:'ic9', name:'Vísindavefurinn', url:'https://www.visindavefur.is', rss:'https://www.visindavefur.is/feed/', freq:'sporadic', region:'iceland', enabled:true },

  // ── ICELAND · ENGLISH ──
  { id:'ic10', name:'Reykjavík Grapevine', url:'https://grapevine.is', rss:'https://grapevine.is/feed/', freq:'weekly', region:'iceland', enabled:true, maxItems:5 },
  { id:'ic11', name:'Iceland Review', url:'https://www.icelandreview.com', rss:'https://www.icelandreview.com/feed/', freq:'daily', region:'iceland', enabled:true, maxItems:4 },
  { id:'ic12', name:'Iceland Monitor (mbl)', url:'https://icelandmonitor.mbl.is', rss:'https://icelandmonitor.mbl.is/rss/', freq:'daily', region:'iceland', enabled:false, maxItems:3 },

  // ── INTERNATIONAL · SPORADIC / SLOW ──
  { id:'in1', name:'Hakai Magazine', url:'https://hakaimagazine.com', rss:'https://hakaimagazine.com/feed/', freq:'sporadic', region:'international', enabled:true },
  { id:'in2', name:'Undark', url:'https://undark.org', rss:'https://undark.org/feed/', freq:'sporadic', region:'international', enabled:true },
  { id:'in3', name:'Nautilus', url:'https://nautil.us', rss:'https://nautil.us/feed/', freq:'sporadic', region:'international', enabled:true },
  { id:'in4', name:'Delayed Gratification', url:'https://www.slow-journalism.com', rss:null, freq:'sporadic', region:'international', enabled:true },
  { id:'in13', name:'Double Down News', url:'https://doubledownnews.com', rss:'https://doubledownnews.com/feed/', freq:'sporadic', region:'international', enabled:true },

  // ── INTERNATIONAL · WEEKLY ──
  { id:'in5', name:'Jacobin', url:'https://jacobin.com', rss:'https://jacobin.com/feed/', freq:'weekly', region:'international', enabled:true, maxItems:5 },
  { id:'in6', name:'Current Affairs', url:'https://www.currentaffairs.org', rss:'https://www.currentaffairs.org/feed', freq:'weekly', region:'international', enabled:true, maxItems:5 },
  { id:'in7', name:'Le Monde Diplomatique', url:'https://mondediplo.com', rss:'https://mondediplo.com/rss/1', freq:'weekly', region:'international', enabled:true, maxItems:5 },
  { id:'in8', name:'New Statesman', url:'https://www.newstatesman.com', rss:'https://www.newstatesman.com/feed/', freq:'weekly', region:'international', enabled:true, maxItems:5 },

  // ── INTERNATIONAL · DAILY ──
  { id:'in9', name:'The Guardian', url:'https://www.theguardian.com', rss:'https://www.theguardian.com/world/rss', freq:'daily', region:'international', enabled:true, maxItems:4 },
  { id:'in10', name:'Carbon Brief', url:'https://www.carbonbrief.org', rss:'https://www.carbonbrief.org/feed/', freq:'daily', region:'international', enabled:true, maxItems:4 },

  // ── INTERNATIONAL · HOURLY ──
  { id:'in11', name:'BBC News', url:'https://www.bbc.com/news', rss:'https://feeds.bbci.co.uk/news/rss.xml', freq:'hourly', region:'international', enabled:true, maxItems:3 },
  { id:'in12', name:'Reuters', url:'https://www.reuters.com', rss:'https://feeds.reuters.com/reuters/topNews', freq:'hourly', region:'international', enabled:true, maxItems:3 },
];

let feedData = {};
let currentFilter = 'all';
let currentSourceFilter = null;

// Persist to localStorage
function saveState() {
  const state = SOURCES.map(s => ({ id:s.id, enabled:s.enabled }));
  localStorage.setItem('amplified-sources', JSON.stringify(state));
}

function loadState() {
  try {
    const state = JSON.parse(localStorage.getItem('amplified-sources') || '[]');
    state.forEach(s => { const src = SOURCES.find(x => x.id === s.id); if(src) src.enabled = s.enabled; });
  } catch(e) {}
}

// ── SIDEBAR ──
function renderSidebar() {
  const el = document.getElementById('sidebarInner');
  const groups = [
    { label:'Iceland · Alt / Investigative', filter: s => s.region==='iceland' && (s.freq==='sporadic'||s.freq==='weekly') },
    { label:'Iceland · Mainstream', filter: s => s.region==='iceland' && (s.freq==='daily'||s.freq==='hourly') },
    { label:'International · Slow Burn', filter: s => s.region==='international' && (s.freq==='sporadic'||s.freq==='weekly') },
    { label:'International · Daily / Hourly', filter: s => s.region==='international' && (s.freq==='daily'||s.freq==='hourly') },
  ];
  let html = '';
  groups.forEach(g => {
    const srcs = SOURCES.filter(g.filter);
    if(!srcs.length) return;
    html += `<div class="sec-label">${g.label}</div>`;
    srcs.forEach(s => {
      const rssIcon = s.rss ? '📡' : '🤖';
      html += `<div class="src${s.enabled?' active':''}">
        <div class="pulse ${s.freq}"></div>
        <div class="src-info">
          <div class="src-name">${s.name} <span style="font-size:9px;opacity:.4" title="${s.rss?'Has RSS feed':'Claude fallback'}">${rssIcon}</span></div>
          <div class="src-sub">${s.freq} · ${s.region==='iceland'?'🇮🇸':'🌍'}</div>
        </div>
        <button class="toggle ${s.enabled?'on':''}" onclick="toggleSrc('${s.id}',event)"></button>
      </div>`;
    });
  });
  el.innerHTML = html;
}

function toggleSrc(id, evt) {
  evt.stopPropagation();
  const s = SOURCES.find(x => x.id === id);
  if(s) { s.enabled = !s.enabled; saveState(); renderSidebar(); }
}

function selectAll() { SOURCES.forEach(s => s.enabled = true); saveState(); renderSidebar(); }
function selectNone() { SOURCES.forEach(s => s.enabled = false); saveState(); renderSidebar(); }

function filterBySource(id) {
  currentSourceFilter = (currentSourceFilter === id) ? null : id;
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
  if(!currentSourceFilter) {
    currentFilter = 'all';
    const allBtn = document.querySelector('.f-btn');
    if(allBtn) allBtn.classList.add('active');
  }
  renderSidebar();
  if(Object.keys(feedData).length) renderFeed();
}

// ── FETCH RSS via PROXY ──
async function fetchRSS(source) {
  if(!source.rss) return null;
  const limit = source.maxItems || 6;
  try {
    const url = `${RSS_PROXY}${encodeURIComponent(source.rss)}&count=${limit + 2}`;
    const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
    const data = await res.json();
    if(data.status !== 'ok' || !data.items?.length) return null;
    return data.items.slice(0, limit).map(item => ({
      sourceId: source.id,
      sourceName: source.name,
      headline: item.title?.trim() || '(no title)',
      summary: stripHtml(item.description || item.content || '').slice(0, 160).trim(),
      url: item.link || source.url,
      date: item.pubDate ? formatDate(item.pubDate) : '',
      via: 'rss'
    }));
  } catch(e) { return null; }
}

function stripHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.textContent || '';
}

function formatDate(str) {
  try {
    const d = new Date(str);
    const now = new Date();
    const diff = now - d;
    if(diff < 3600000) return Math.floor(diff/60000) + 'm ago';
    if(diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
    if(diff < 604800000) return Math.floor(diff/86400000) + 'd ago';
    return d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
  } catch(e) { return str; }
}

// ── FETCH VIA CLAUDE (fallback) ──
async function fetchClaude(sources) {
  if(!sources.length) return {};
  const sourceList = sources.map(s =>
    `- ID:${s.id} | ${s.name} (${s.url}) | freq:${s.freq} | show max ${s.maxItems||6} items`
  ).join('\n');

  const prompt = `You are a news aggregator. For each source below, list their most recent significant headlines you know about.
Return ONLY a JSON array — no markdown, no preamble.
Each object: { "sourceId": "...", "headline": "...", "summary": "one sentence", "url": "...", "date": "approx date" }

Sources:
${sourceList}

Rules:
- hourly sources: only 2-3 top headlines, be very selective
- sporadic sources: prefer long-form, in-depth pieces
- Return only the JSON array`;

  const res = await fetch("/.netlify/functions/claude-proxy", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ prompt })
  });
  const data = await res.json();
  const raw = data.content?.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim();
  const items = JSON.parse(raw);
  const result = {};
  items.forEach(a => {
    if(!result[a.sourceId]) result[a.sourceId] = [];
    result[a.sourceId].push({ ...a, via:'claude' });
  });
  return result;
}

// ── MAIN FETCH ──
async function fetchAll() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true; btn.textContent = '↻ fetching…';

  const enabled = SOURCES.filter(s => s.enabled);
  const content = document.getElementById('feedContent');
  content.innerHTML = `<div class="loading"><div class="spin"></div><div class="loading-txt">Gathering headlines</div><div class="loading-sub">Trying RSS for ${enabled.filter(s=>s.rss).length} sources, Claude fallback for the rest</div></div>`;

  feedData = {};
  const needsClaude = [];

  // Parallel RSS fetches
  const rssResults = await Promise.allSettled(enabled.map(s => fetchRSS(s)));

  enabled.forEach((s, i) => {
    const r = rssResults[i];
    if(r.status === 'fulfilled' && r.value) {
      feedData[s.id] = r.value;
    } else if(r.status === 'rejected' || !r.value) {
      needsClaude.push(s);
    }
  });

  // Claude fallback for sources without RSS or where RSS failed
  if(needsClaude.length) {
    try {
      const claudeData = await fetchClaude(needsClaude);
      Object.assign(feedData, claudeData);
    } catch(e) {
      console.warn('Claude fallback failed:', e);
    }
  }

  renderFeed();
  document.getElementById('lastUpdated').textContent = 'updated ' + new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  btn.disabled = false; btn.textContent = '↻ Refresh';
}

// ── RENDER ──
function renderFeed() {
  const content = document.getElementById('feedContent');
  const freqOrder = ['sporadic','weekly','daily','hourly'];

  const visible = SOURCES.filter(s => {
    if(!s.enabled) return false;
    if(!feedData[s.id]?.length) return false;
    if(currentSourceFilter) return s.id === currentSourceFilter;
    if(currentFilter === 'iceland') return s.region === 'iceland';
    if(currentFilter === 'international') return s.region === 'international';
    if(currentFilter !== 'all' && s.freq !== currentFilter) return false;
    return true;
  }).sort((a,b) => {
    if(a.region !== b.region) return a.region === 'iceland' ? -1 : 1;
    return freqOrder.indexOf(a.freq) - freqOrder.indexOf(b.freq);
  });

  if(!visible.length) {
    content.innerHTML = `<div class="empty">No articles to show.<br>Try a different filter or click ↻ Refresh.</div>`;
    return;
  }

  let total = 0, html = '';
  visible.forEach(s => {
    const articles = feedData[s.id] || [];
    const via = articles[0]?.via;
    const viaTag = via === 'rss'
      ? `<span class="rss-status rss-live">RSS live</span>`
      : via === 'claude'
      ? `<span class="rss-status rss-fallback">Claude</span>`
      : '';
    const flag = s.region === 'iceland' ? '🇮🇸 ' : '';

    html += `<div class="src-group">
      <div class="grp-header">
        <div class="pulse ${s.freq}" style="width:8px;height:8px"></div>
        <div class="grp-name">${flag}${s.name}</div>
        <div class="grp-badge b-${s.freq}">${s.freq}</div>
        ${viaTag}
        <a class="grp-link" href="${s.url}" target="_blank">visit ↗</a>
      </div>
      <div class="news-grid">`;

    articles.forEach(a => {
      total++;
      const spot = s.freq === 'sporadic';
      html += `<a class="card${spot?' spot':''}" href="${a.url}" target="_blank">
        <div class="card-hed">${a.headline}</div>
        ${a.summary ? `<div class="card-desc">${a.summary}</div>` : ''}
        <div class="card-meta">${a.date || ''}</div>
      </a>`;
    });
    html += `</div></div>`;
  });

  content.innerHTML = html;
  document.getElementById('feedCount').textContent = `${total} article${total!==1?'s':''}`;
}

// ── FILTER ──
function setFilter(f, btn) {
  currentFilter = f;
  currentSourceFilter = null;
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderSidebar();
  if(Object.keys(feedData).length) renderFeed();
}

// ── INIT ──
loadState();
renderSidebar();
</script>
